<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }
        .error-container {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
        }
        .error-image {
            margin: 20px 0;
            border-radius: 10px;
        }
        .error-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="w3-container w3-red">
    <h1>Error 404: Page Not Found</h1>
</div>

<div class="error-container">
    <img src="images/errorpage2.jpg" alt="Error Image" class="w3-image error-image">
    <p>Sorry, the page you are looking for does not exist. Please check the URL or go back to the homepage.</p>
    <p><a href="http://portfoliosurvey2.s3-website.us-east-2.amazonaws.com/" class="w3-button w3-blue error-button">Go to Homepage</a></p>
</div>

</body>
</html>
